<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/brython@3/brython.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/brython@3/brython_stdlib.js"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <title>ReciPy</title>

    <script defer type="text/python" src="/static/header_buttons.py"></script>
    <script defer type="text/python" src="/static/recipe.py"></script>
</head>
<body onload="brython()">
    <div id="app"></div>
    <header>
        <a class="header-recipy-link" href="/">
            <h1 class="header-recipy-h1">
                ReciPy
            </h1>
        </a>
        <div class="header-links">
            <a href="/static/login.html">
                Login
            </a>
            <a href="/static/register.html">
                Register
            </a>
        </div>
        <div class="header-logged-in-links">
            <a class="my-recipes-link" href="/static/me.html">
                User
            </a>
            <button class="log-out-button">
                Log Out
            </button>
        </div>
    </header>

    <div class="recipe-full-container">
        <h1 class="recipe-full-error">Log in to Access</h1>
        <div class="recipe-full">
            <div class="recipe-image-full"></div>
            <div class="recipe-info-full">
                <h1 class="recipe-title-full"></h1>
                <div class="recipe-full-buttons">
                    <button class="recipe-full-edit">Edit</button>
                    <button class="recipe-full-delete">Delete</button>
                </div>
                <div class="recipe-username-full-wraper">By: <a class="recipe-username-full" href="/static/user.html"></a> <span class="recipe-is-public-full"></span></div>
                <div class="recipe-description-full">
                </div>
                <div class="recipe-ingredients-full">
                    Ingredients: 
                    <ul class="recipe-ingredients-list">
                    </ul>
                </div>
                <div class="recipe-instructions-full">
                    
                </div>
            </div>
    </div>

    <div class="recipe-editor-form-background">
        <div class="recipe-editor-form">
            <div class="recipe-editor-title-button">
                <h1>Edit Recipe</h1>
                <button class="recipe-editor-exit-button">x</button>
            </div>
            <hr>
            <form class="recipe-editor">
                <i>
                    *Note that only the filled fields will update the recipe. Leave a field blank to keep the current value.
                </i>
                <div class="form-input-grouping">
                    <label class="form-recipe-title-lable" for="form-recipe-title">Recipe Name: </label>
                    <input autocorrect="off" autocomplete="off" spellcheck="false" class="form-recipe-title" id="form-recipe-title" name="form-recipe-title" type="text">
                </div>
                <div class="form-textarea-grouping">
                    <label class="form-recipe-description-label" for="form-recipe-description">Recipe Description: </label>
                    <textarea class="form-recipe-description" id="form-recipe-description" name="form-recipe-description" resize="vertical"></textarea>
                </div>
                <div class="form-textarea-grouping">
                    <label class="form-recipe-ingredients-label" for="form-recipe-ingredients">Recipe Ingredients (Comma-Seperated List): </label>
                    <textarea class="form-recipe-ingredients" id="form-recipe-ingredients" name="form-recipe-ingredients" resize="vertical"></textarea>
                </div>
                <div class="form-textarea-grouping">
                    <label class="form-recipe-instructions-label" for="form-recipe-instructions">Recipe Instructions: </label>
                    <textarea class="form-recipe-instructions" id="form-recipe-instructions" name="form-recipe-instructions" resize="vertical"></textarea>
                </div>
                <div class="form-button-grouping">
                    <button class="form-recipe-submit" type="submit">Edit Recipe</button>
                    <button type="reset">Reset</button>
                    <button class="form-recipe-cancel" type="button">Cancel</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
