<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/brython@3/brython.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/brython@3/brython_stdlib.js"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="icon" href="/static/favicon.ico">
    <title>ReciPy</title>

    <script defer type="text/python" src="/static/header_buttons.py"></script>
    <script defer type="text/python" src="/static/login.py"></script>
</head>
<body onload="brython()">
    <div id="app"></div>
    <header>
        <a class="header-recipy-link" href="/">
            <h1 class="header-recipy-h1">
                ReciPy
            </h1>
        </a>
        <div class="header-links">
            <a href="/static/login.html">
                Login
            </a>
            <a href="/static/register.html">
                Register
            </a>
        </div>
        <div class="header-logged-in-links">
            <a class="my-recipes-link" href="/static/me.html">
                User
            </a>
            <button class="log-out-button">
                Log Out
            </button>
        </div>
    </header>

    <h1 class="login-text">Login</h1>

    <div class="login-center">
        <div class="login-area">
            <div class="login-inputs">
                <input id="#login-key" class="login-key" placeholder="API Key...">
                <button class="login-key-button">Login</button>
            </div>
            <div class="register-info login-info"></div>
        </div>
    </div>

    <div class="login-page-register-text">Don't have an API Key? Register <a class="login-page-register-link" href="/static/register.html">here</a> instead!</div>

</body>
</html>
