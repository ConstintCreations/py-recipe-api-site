<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/brython@3/brython.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/brython@3/brython_stdlib.js"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="icon" href="/static/favicon.ico">
    <title>ReciPy</title>

    <script defer type="text/python" src="/static/header_buttons.py"></script>
    <script defer type="text/python" src="/static/app.py"></script>
    <script type="module" src="https://md-block.verou.me/md-block.js"></script>
</head>
<body onload="brython()">
    <div id="app"></div>
    <header>
        <a class="header-recipy-link" href="/">
            <h1 class="header-recipy-h1">
                ReciPy
            </h1>
        </a>
        <div class="header-links">
            <a href="/static/login.html">
                Login
            </a>
            <a href="/static/register.html">
                Register
            </a>
        </div>
        <div class="header-logged-in-links">
            <a class="my-recipes-link" href="/static/me.html">
                User
            </a>
            <button class="log-out-button">
                Log Out
            </button>
        </div>
    </header>

    <div class="recipe-full-container">
        <div class="recipe-full">
            <div class="recipe-image-full"></div>
            <div class="recipe-info-full">
                <h1 class="recipe-title-full">Spaghetti and Meatballs</h1>
                <div class="recipe-username-full-wraper">By: <a class="recipe-username-full" href="/static/user.html">User</a> <span class="recipe-is-public-full">(Public)</span></div>
                <div class="recipe-description-full">
                    A classic Italian dish.
                </div>
                <div class="recipe-ingredients-full">
                    Ingredients: 
                    <ul class="recipe-ingredients-list">
                        <li class="recipe-ingredients-list-item">Spaghetti</li>
                        <li class="recipe-ingredients-list-item">Meatballs</li>
                    </ul>
                </div>
                <md-block class="recipe-instructions-full">
                    # Instructions
                    <hr>
                    <br>

                        1. Get Spaghetti 
                        2. Cook Spaghetti
                        3. Make Meatballs
                        4. Put Together
                        5. BOOM! Spaghetti and Meatballs
                </md-block>
            </div>
    </div>

</body>
</html>
