<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/brython@3/brython.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/brython@3/brython_stdlib.js"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="icon" href="/static/favicon.ico">
    <title>ReciPy</title>

    <script defer type="text/python" src="/static/header_buttons.py"></script>
    <script defer type="text/python" src="/static/me.py"></script>
</head>
<body onload="brython()">
    <div id="app"></div>
    <header>
        <a class="header-recipy-link" href="/">
            <h1 class="header-recipy-h1">
                ReciPy
            </h1>
        </a>
        <div class="header-links">
            <a href="/static/login.html">
                Login
            </a>
            <a href="/static/register.html">
                Register
            </a>
        </div>
        <div class="header-logged-in-links">
            <a class="my-recipes-link" href="/static/me.html">
                User
            </a>
            <button class="log-out-button">
                Log Out
            </button>
        </div>
    </header>

    <h1 class="me-user-title">Log in to Access</h1>

    <div class="me-user-info">
        <div class="me-api-key-wrapper">API Key: <button class="me-api-key-text">apikeyapikeyapikey</button></div>
        <div class="me-recipe-count-wrapper">Recipes: <p class="me-recipe-count-text">0</p></div>
    </div>

    <div class="me-user-recipes">

        <button class="create-recipe">
            +
        </button>

    </div>

</body>
</html>
